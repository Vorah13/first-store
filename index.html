<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FIRST STORE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{background:#f4f7ff}

header{
background:#0b5cff;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center
}

.search{padding:8px;border-radius:6px;border:none}

.container{width:90%;max-width:1100px;margin:auto;padding:20px}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px
}

.product{
background:white;
padding:12px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.08)
}

.product img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px
}

button{
background:#0b5cff;
color:white;
border:none;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
margin-top:6px
}

.page{display:none}
.active{display:block}

.cartbar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#0b5cff;
color:white;
padding:14px 25px;
border-radius:40px;
cursor:pointer
}

.cartitem{
display:flex;
justify-content:space-between;
margin:6px 0
}

input,textarea{
width:100%;
padding:8px;
margin:5px 0;
border:1px solid #ccc;
border-radius:6px
}

.review{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.08)
}

</style>

</head>

<body>

<header>

<h2>FIRST STORE</h2>

<input class="search" placeholder="Search..." onkeyup="searchProduct(this.value)">

</header>

<!-- STORE -->

<div id="storePage" class="page active">

<div class="container">

<div class="grid" id="products"></div>

</div>

</div>

<!-- CART -->

<div id="cartPage" class="page">

<div class="container">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total ₹<span id="total">0</span></h3>

<h3>Customer Details</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="address" placeholder="Address"></textarea>

<button onclick="placeOrder()">Place Order</button>
<button onclick="openPage('storePage')">Back</button>

</div>

</div>

<!-- SUCCESS -->

<div id="successPage" class="page">

<div class="container">

<h1>Order Successful 🎉</h1>

<p>Invoice</p>

<h2 id="invoice"></h2>

<button onclick="openPage('storePage')">Continue Shopping</button>

</div>

</div>

<!-- OWNER DASHBOARD -->

<div id="dashboardPage" class="page">

<div class="container">

<h2>Owner Order Dashboard</h2>

<div id="orders"></div>

<button onclick="openPage('storePage')">Back</button>

</div>

</div>

<!-- REVIEWS -->

<div class="container">

<h2>Customer Reviews</h2>

<div class="grid">

<div class="review">⭐⭐⭐⭐⭐ Amazing product – Rahul</div>
<div class="review">⭐⭐⭐⭐ Fast delivery – Priya</div>
<div class="review">⭐⭐⭐⭐⭐ Good quality – Amit</div>
<div class="review">⭐⭐⭐⭐ Worth the price – Sneha</div>

</div>

</div>

<div class="cartbar" onclick="openPage('cartPage')">
🛒 Cart (<span id="cartcount">0</span>)
</div>

<script>

const products=[

{name:"Smart Watch",price:999,img:"https://i.ibb.co/3y03DBtp/smartwatch.png"},
{name:"Wireless Earbuds",price:799,img:"https://picsum.photos/200?2"},
{name:"Ring Light",price:499,img:"https://picsum.photos/200?3"},
{name:"Bluetooth Speaker",price:699,img:"https://picsum.photos/200?4"},
{name:"Power Bank",price:599,img:"https://picsum.photos/200?5"},
{name:"USB Cable",price:149,img:"https://picsum.photos/200?6"},
{name:"Phone Stand",price:199,img:"https://picsum.photos/200?7"},
{name:"Laptop Pad",price:899,img:"https://picsum.photos/200?8"},
{name:"LED Lamp",price:399,img:"https://picsum.photos/200?9"},
{name:"Mini Fan",price:299,img:"https://picsum.photos/200?10"}

]

let cart=[]

function loadProducts(list=products){

let box=document.getElementById("products")

box.innerHTML=""

list.forEach((p,i)=>{

box.innerHTML+=`

<div class="product">

<img src="${p.img}">

<h4>${p.name}</h4>

<p>₹${p.price}</p>

<button onclick="add(${i})">Add to Cart</button>

</div>

`

})

}

function add(i){
cart.push(products[i])
updateCart()
}

function updateCart(){

document.getElementById("cartcount").innerText=cart.length

let total=0
let html=""

cart.forEach((item,index)=>{

total+=item.price

html+=`
<div class="cartitem">
${item.name} ₹${item.price}
<button onclick="remove(${index})">X</button>
</div>
`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total

}

function remove(i){
cart.splice(i,1)
updateCart()
}

function openPage(p){

document.querySelectorAll(".page").forEach(pg=>pg.classList.remove("active"))
document.getElementById(p).classList.add("active")

if(p==="dashboardPage") loadOrders()

}

function searchProduct(q){

q=q.toLowerCase()

loadProducts(products.filter(p=>p.name.toLowerCase().includes(q)))

}

function placeOrder(){

if(cart.length===0) return alert("Cart empty")

const name=document.getElementById("name").value
const phone=document.getElementById("phone").value
const address=document.getElementById("address").value

const invoice="INV"+Math.floor(Math.random()*100000)

let total=0

let items=cart.map(i=>{
total+=i.price
return i.name+" ₹"+i.price
}).join(", ")

saveOrder(invoice,name,phone,address,items,total)

generatePDF(invoice,name,phone,address,items,total)

document.getElementById("invoice").innerText=invoice

cart=[]
updateCart()

openPage("successPage")

}

function saveOrder(invoice,name,phone,address,items,total){

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

orders.push({invoice,name,phone,address,items,total})

localStorage.setItem("orders",JSON.stringify(orders))

}

function loadOrders(){

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

let html=""

orders.forEach(o=>{

html+=`

<div style="background:white;padding:10px;margin:10px 0;border-radius:8px">

<b>${o.invoice}</b><br>
${o.name}<br>
${o.phone}<br>
${o.address}<br>
${o.items}<br>
₹${o.total}

</div>

`

})

document.getElementById("orders").innerHTML=html

}

function generatePDF(invoice,name,phone,address,items,total){

const { jsPDF } = window.jspdf
const doc = new jsPDF()

doc.text("FIRST STORE INVOICE",20,20)
doc.text("Invoice: "+invoice,20,40)
doc.text("Name: "+name,20,50)
doc.text("Phone: "+phone,20,60)
doc.text("Address: "+address,20,70)
doc.text("Items: "+items,20,90)
doc.text("Total: ₹"+total,20,110)

doc.save("invoice_"+invoice+".pdf")

}

loadProducts()

</script>

</body>
</html>
